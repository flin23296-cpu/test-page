<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>《刚刚离开的世界》属于你的故事测试</title>
  <meta name="description" content="6道题，找到打动你的故事">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <!-- 封面页 -->
    <section id="cover" class="page active">
      <div class="cover-content">
        <div class="cover-glow"></div>
        <div class="cover-nebula"></div>
        <div class="cover-ferris">
          <div class="ferris-wheel">
            <div class="ferris-spoke" style="transform: translateX(-50%) rotate(60deg);"></div>
            <div class="ferris-spoke" style="transform: translateX(-50%) rotate(120deg);"></div>
            <div class="ferris-spoke" style="transform: translateX(-50%) rotate(150deg);"></div>
            <div class="ferris-cabin" style="top: -6px; left: calc(50% - 6px);"></div>
            <div class="ferris-cabin" style="top: calc(50% - 6px); left: calc(100% - 6px);"></div>
            <div class="ferris-cabin" style="top: calc(100% - 6px); left: calc(50% - 6px);"></div>
            <div class="ferris-cabin" style="top: calc(50% - 6px); left: -6px;"></div>
            <div class="ferris-cabin" style="top: 15%; left: 80%;"></div>
            <div class="ferris-cabin" style="top: 80%; left: 15%;"></div>
          </div>
        </div>
        <div class="cover-stars">
          <div class="star" style="top:8%;left:12%;width:2px;height:2px;opacity:0.4;animation-delay:0s"></div>
          <div class="star" style="top:15%;left:45%;width:5px;height:5px;opacity:1;animation-delay:1.2s"></div>
          <div class="star" style="top:22%;left:88%;width:2px;height:2px;opacity:0.5;animation-delay:2.1s"></div>
          <div class="star" style="top:35%;left:5%;width:2px;height:2px;opacity:0.3;animation-delay:0.8s"></div>
          <div class="star" style="top:28%;left:30%;width:5px;height:5px;opacity:1;animation-delay:1.5s"></div>
          <div class="star" style="top:40%;left:75%;width:2px;height:2px;opacity:0.4;animation-delay:2.5s"></div>
          <div class="star" style="top:10%;left:25%;width:2px;height:2px;opacity:0.5;animation-delay:1.8s"></div>
          <div class="star" style="top:12%;left:82%;width:4px;height:4px;opacity:0.8;animation-delay:0.4s"></div>
          <div class="star" style="top:3%;left:35%;width:2px;height:2px;opacity:0.4;animation-delay:2.3s"></div>
          <div class="star" style="top:65%;left:70%;width:5px;height:5px;opacity:1;animation-delay:1.9s"></div>
          <div class="star" style="top:2%;left:65%;width:2px;height:2px;opacity:0.5;animation-delay:1.7s"></div>
          <div class="star" style="top:33%;left:68%;width:4px;height:4px;opacity:0.7;animation-delay:2.2s"></div>
        </div>
        <h1 class="book-title">《刚刚离开的世界》</h1>
        <p class="cover-note">韩女作家金草叶短篇小说集，七个关于无法理解但依然相爱的故事。</p>
        <p class="cover-divider">七个故事，分别属于不同的灵魂</p>
        <p class="cover-cta">7道题，找到打动你的那一篇</p>
        <h1 class="main-title">属于你的故事测试</h1>
        <button class="btn-start" onclick="startTest()">开始测试</button>
        <p class="time-estimate">约需3分钟</p>
      </div>
    </section>

    <!-- 测试页 -->
    <section id="test" class="page">
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
      <div class="question-container">
        <p class="question-number" id="questionNumber">第 1 题</p>
        <h2 class="question-text" id="questionText"></h2>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 加载页 -->
    <section id="loading" class="page">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>正在分析你的答案...</p>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="result" class="page">
      <div class="result-content">
        <div class="result-type" id="resultType"></div>
        
        <p class="result-slogan" id="resultSlogan"></p>
        
        <div class="keywords" id="keywords"></div>
        
        <div class="result-section">
          <p class="result-description" id="resultDescription"></p>
        </div>

        <div class="result-story" id="resultStory"></div>

        <div class="result-story-intro" id="resultStoryIntro"></div>
        
        <div class="result-story-intro" id="resultStoryIntroQuote">
          <p class="result-intro-label">故事中的一句话</p>
          <p class="result-story-intro-text" id="resultQuote"></p>
        </div>
        
        <div class="action-buttons">
          <a class="btn-buy" id="buyLink" href="#" target="_blank">立即购买</a>
          <button class="btn-share" onclick="generateShareImage()">生成分享图</button>
        </div>
      </div>
    </section>

    <!-- 分享图片预览 -->
    <section id="sharePreview" class="page">
      <div class="share-preview-content">
        <h2>分享图已生成</h2>
        <div class="share-image-container">
          <img id="shareImagePreview" alt="分享图预览">
        </div>
        <div class="share-actions">
          <button class="btn-secondary" onclick="downloadShareImage()">下载图片</button>
          <button class="btn-secondary" onclick="goToResult()">返回结果</button>
        </div>
      </div>
    </section>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // 粒子效果
    function addParticle(x, y) {
      const particle = document.createElement('div');
      particle.className = 'mouse-particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      document.body.appendChild(particle);
      
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2 + 1;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const size = Math.random() * 4 + 2;
      
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.opacity = '1';
      
      let life = 0;
      const maxLife = 25;
      
      function animate() {
        life++;
        const currentOpacity = 1 - (life / maxLife);
        particle.style.opacity = currentOpacity;
        particle.style.transform = `translate(${vx * life}px, ${vy * life}px)`;
        
        if (life < maxLife) {
          requestAnimationFrame(animate);
        } else {
          particle.remove();
        }
      }
      
      requestAnimationFrame(animate);
    }
    
    // 鼠标事件
    document.addEventListener('mousemove', (e) => {
      for (let i = 0; i < 2; i++) {
        addParticle(e.clientX, e.clientY);
      }
    });
    
    // 手机触摸事件
    let touchX = 0, touchY = 0, touchInterval = null;
    document.addEventListener('touchstart', (e) => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
      for (let i = 0; i < 3; i++) {
        addTouchParticle(touchX, touchY);
      }
      touchInterval = setInterval(() => {
        for (let i = 0; i < 2; i++) {
          addTouchParticle(touchX, touchY);
        }
      }, 80);
    });

    document.addEventListener('touchmove', (e) => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
      for (let i = 0; i < 2; i++) {
        addTouchParticle(touchX, touchY);
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      clearInterval(touchInterval);
    });

    // 书名点击特效
    document.querySelector('.book-title').addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const colors = ['#00d4ff', '#6b8cff', '#9b6bff', '#ffffff', '#c8d8ff'];
      for (let i = 0; i < 25; i++) {
        createSpecialParticle(cx, cy, colors[Math.floor(Math.random() * colors.length)]);
      }
    });

    function createSpecialParticle(x, y, color) {
      const particle = document.createElement('div');
      particle.className = 'touch-particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      particle.style.width = (Math.random() * 5 + 3) + 'px';
      particle.style.height = particle.style.width;
      particle.style.background = color;
      particle.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;
      document.body.appendChild(particle);

      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 4 + 2;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;

      let life = 0;
      const maxLife = 35;

      function animate() {
        life++;
        const progress = life / maxLife;
        particle.style.opacity = 1 - progress;
        particle.style.transform = `translate(${vx * life * 1.5}px, ${vy * life * 1.5}px)`;

        if (life < maxLife) {
          requestAnimationFrame(animate);
        } else {
          particle.remove();
        }
      }

      requestAnimationFrame(animate);
    }

    // 触摸粒子函数
    function addTouchParticle(x, y) {
      const particle = document.createElement('div');
      particle.className = 'touch-particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      document.body.appendChild(particle);

      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 2 + 1;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const size = Math.random() * 4 + 2;

      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.opacity = '1';

      let life = 0;
      const maxLife = 25;

      function animate() {
        life++;
        const currentOpacity = 1 - (life / maxLife);
        particle.style.opacity = currentOpacity;
        particle.style.transform = `translate(${vx * life}px, ${vy * life}px)`;

        if (life < maxLife) {
          requestAnimationFrame(animate);
        } else {
          particle.remove();
        }
      }

      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
